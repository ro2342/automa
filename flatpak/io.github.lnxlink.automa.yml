app-id: io.github.lnxlink.automa
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: automa

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.systemd1
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=xdg-data/themes:ro
  - --filesystem=xdg-config/gtk-4.0:ro
  - --socket=session-bus
  - --own-name=io.github.lnxlink.automa

modules:
  - python3-modules.json  # O builder vai ler este arquivo para baixar tudo

  - name: automa
    buildsystem: simple
    build-commands:
      # 1. Cria a pasta de destino
      - mkdir -p /app/share/automa
      
      # 2. Copia TUDO (mantém a estrutura exata de pastas)
      - cp -r . /app/share/automa/
      
      # 3. FAXINA: Deleta especificamente o que está sujando seu build
      # Isso garante que, mesmo que o arquivo exista no seu PC/Git, 
      # ele seja banido do pacote final do Flatpak.
      - rm -rf /app/share/automa/build-dir
      - rm -rf /app/share/automa/.flatpak-builder
      - rm -f /app/share/automa/data/icons/hicolor/scalable/apps/io.github.lnxlink.automa.svg
      
      # 4. Continua com as instalações oficiais
      - install -Dm755 bin/automa /app/bin/automa
      - install -Dm644 flatpak/io.github.lnxlink.automa.desktop /app/share/applications/io.github.lnxlink.automa.desktop
      - install -Dm644 flatpak/io.github.lnxlink.automa.metainfo.xml /app/share/metainfo/io.github.lnxlink.automa.metainfo.xml
      - install -Dm644 flatpak/icons/io.github.lnxlink.automa.svg /app/share/icons/hicolor/scalable/apps/io.github.lnxlink.automa.svg
      
    sources:
      - type: git
        url: https://github.com/ro2342/automa.git
        tag: v1.0.0
